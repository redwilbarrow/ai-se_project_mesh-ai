run-name: 'Running tests for ${{ github.event.head_commit.message }}'

on:
  push:
  pull_request:

jobs:
  auto-tests:
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Set up GitHub Actions
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
      - name: Install dependencies
        run: |
          npm ci --loglevel=error --no-fund --no-audit --ignore-scripts
          npm i github:tripleten-com/se-actions-lib-p#0.0.10

      - name: Build the project
        run: npm run build

      - name: Installing wait-port
        run: npm install -g wait-port

      - name: Create .env file
        run: |
          echo "MONGO_URI=mongodb://127.0.0.1:27017/meshai" > .env
          echo "PORT=3000" >> .env
          JWT_SECRET=$(node -e "console.log(require('crypto').randomUUID())")
          echo "JWT_SECRET=${JWT_SECRET}" >> .env

      - name: Run server
        run: npm run start & wait-port -t 30000 localhost:3000

      - name: Run collection tests
        run: npx se-actions-main